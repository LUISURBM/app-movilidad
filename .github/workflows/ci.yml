# CI de FleetSpecial — corre la suite completa del backend en cada push/PR.
#
# La suite NO necesita servicios externos: los tests de integración usan PGlite
# (Postgres compilado a WASM, in-process), así que no hay contenedor de Postgres.
# Duración esperada: ~2-3 min.
#
# NOTA lockfile: cuando corras `pnpm install` local y commitees `pnpm-lock.yaml`,
# cambia el paso de instalación a `pnpm install --frozen-lockfile` y activa la
# caché (`cache: pnpm` en setup-node) para builds reproducibles y más rápidos.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + tests (unit, integración PG, E2E HTTP)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 10+: requerido por las defensas de cadena de suministro
      # declaradas en pnpm-workspace.yaml (minimumReleaseAge).
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Suite completa (142 tests)
        run: pnpm test

  sync_core:
    name: Mobile — sync_core (Dart puro, analyze + 13 escenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mobile/sync_core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # `dart analyze` NO hace pub get implícito (a diferencia de `dart run`);
      # sin package_config no puede resolver `package:sync_core/...` del runner.
      # Con cero dependencias esto no descarga nada: solo escribe .dart_tool/.
      - name: Resolver paquete
        run: dart pub get

      - name: Análisis estático
        run: dart analyze

      - name: Escenarios spec-010 (cliente)
        run: dart run tool/verificar.dart

  flutter_app:
    name: Mobile — app del Conductor (capa de datos, fase 2a)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: mobile/fleetspecial_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Generar código Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Análisis estático
        run: flutter analyze

      - name: Tests (adaptadores Drift + HTTP + ciclo completo)
        run: flutter test
